name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP version
        run: php -v
      - name: Zip plugin
        run: |
          mkdir -p dist
          zip -r dist/margarita-measurements.zip . -x "dist/*" ".git/*"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: margarita-measurements
          path: dist/margarita-measurements.zip
